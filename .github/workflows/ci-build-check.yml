name: CI - Build Check

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Build Astro site (verification only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build